<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Boost ayuda a negocios a verse más profesionales online con páginas web, campañas digitales simples y una presencia digital más clara." />
  <title>Digital Boost | Páginas web y marketing digital para negocios</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255,255,255,0.08);
      --panel-2: rgba(255,255,255,0.05);
      --text: #f5f7fb;
      --muted: #b7bfd3;
      --accent: #6ee7b7;
      --accent-2: #60a5fa;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,0.20), transparent 32%),
        radial-gradient(circle at top right, rgba(110,231,183,0.16), transparent 26%),
        linear-gradient(180deg, #0a0f1d 0%, #10182b 100%);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      padding-top: 18px;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-lockup img {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: var(--shadow);
    }

    .brand-lockup span {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    .language-switch {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-2);
      backdrop-filter: blur(12px);
    }

    .lang-btn {
      min-width: 54px;
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, var(--accent), #86efac);
      color: #08111f;
    }

    .hero {
      padding: 56px 0 56px;
    }

    .pill {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1, h2, h3 {
      margin: 0 0 14px;
      line-height: 1.1;
    }

    h1 {
      font-size: clamp(40px, 7vw, 72px);
      max-width: 860px;
    }

    .lead {
      font-size: clamp(18px, 2.4vw, 22px);
      color: var(--muted);
      max-width: 780px;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .btn-primary {
      color: #08111f;
      background: linear-gradient(135deg, var(--accent), #86efac);
      box-shadow: var(--shadow);
    }

    .btn-secondary {
      color: var(--text);
      border: 1px solid var(--border);
      background: var(--panel-2);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 26px;
    }

    .trust-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .trust-item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
    }

    .trust-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .trust-item span {
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      backdrop-filter: blur(12px);
    }

    .stat-number {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    section {
      padding: 34px 0;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 42px);
      margin-bottom: 10px;
    }

    .section-copy {
      color: var(--muted);
      max-width: 760px;
      margin-bottom: 24px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .service h3,
    .process h3,
    .faq h3 {
      font-size: 22px;
    }

    .service p,
    .process p,
    .faq p,
    .card p,
    li {
      color: var(--muted);
      margin: 0;
    }

    ul {
      padding-left: 18px;
      margin: 14px 0 0;
    }

    .cta {
      margin: 40px 0 70px;
      padding: 30px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(96,165,250,0.18), rgba(110,231,183,0.12));
      box-shadow: var(--shadow);
    }

    .footer {
      padding: 10px 0 42px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .stats,
      .trust-strip,
      .grid-3,
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 44px;
      }
    }
  </style>
</head>

        if (dictionary[key]) element.textContent = dictionary[key];
      });
      document.querySelectorAll('[data-lang-btn]').forEach((button) => {
        button.classList.toggle('active', button.dataset.langBtn === lang);
      });
      localStorage.setItem('impulso-digital-lang', lang);
    }
