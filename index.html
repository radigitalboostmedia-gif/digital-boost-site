      background: transparent;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;

      gap: 14px;
      margin-bottom: 28px;

      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s ease;

    .btn-primary {
      color: #08111f;
      background: linear-gradient(135deg, var(--accent), #86efac);

    }

    .btn-secondary {
